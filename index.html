<!DOCTYPE html><html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kolb Premium Diamond</title><style>body{font-family:Arial;margin:0;background:#f4f7fb}.top{background:#2563eb;color:#fff;padding:12px;text-align:center;position:sticky;top:0}.wrap{max-width:1100px;margin:auto;padding:10px}.card{background:#fff;border-radius:14px;padding:14px;margin:10px 0;box-shadow:0 2px 6px rgba(0,0,0,.08)}.word{border:1px solid #ddd;border-radius:10px;padding:10px;margin:8px 0}.btns button{width:25px;height:25px;border:none;border-radius:50%;color:#fff;margin-right:6px;font-weight:bold}.r1{background:#ef4444}.r2{background:#f97316}.r3{background:#22c55e}.r4{background:#166534}.sel{outline:3px solid #000}.ok{color:green}.bad{color:red}canvas{max-width:100%}</style></head><body><div class='top'><h2>🎓 Kolb Learning Style</h2><h3>vælg ud for hver spørgsmål hvilken af de 4 der mest er dig</h3></div><div class='wrap'><div id='q'></div><div class='card'><h2 id='style'>Ingen profil endnu</h2><p>CE <span id='ce'>0</span> | RO <span id='ro'>0</span> | AC <span id='ac'>0</span> | AE <span id='ae'>0</span></p></div><div class='card'><canvas id='diamond' width='900' height='600'></canvas></div><div class='card'><button onclick='window.print()'>📄 Gem som PDF</button><h3>Forklaring</h3><p><b>CE</b> Konkret Erfaring · <b>RO</b> Reflekterende Observation · <b>AC</b> Abstrakt Konceptualisering · <b>AE</b> Aktiv Eksperimentering</p></div></div><script>const d=[["Involveret","Foreløbig","Diskriminerende","Praktisk"],["Modtagelig","Upartisk","Analytisk","Relevant"],["Følelse","Se","Tænker","Gør"],["Accept","Opmærksom","Evaluering","Risikotager"],["Intuitiv","Afhøring","Logisk","Produktiv"],["Beton","Observere","Abstrakt","Aktiv"],["Nutidsorienteret","Afspejler","Fremtidsorienteret","Praktisk"],["Åben for nye","Indsigtsfuld","Intelligent","Kompetente oplevelser"],["Oplevelse","Observation","Konceptualisering","Eksperimenteren"],["Intens","Reserveret","Rationel","Ansvarlig"]];let a={};const q=document.getElementById('q');d.forEach((r,i)=>{let h='<div class=card><b>'+ (i+1)+'. Rangér (4=mest dig, brug 1,2,3,4 en gang hver)</b>';r.forEach((w,c)=>{h+='<div class=word>'+w+'<div class=btns>';[1,2,3,4].forEach(v=>h+='<button class=r'+v+' onclick="pick('+i+','+c+','+v+',this)">'+v+'</button>');h+='</div></div>'});h+='<div id=s'+i+' class=bad>Ja det er lige dig :-)</div></div>';q.insertAdjacentHTML('beforeend',h)});function pick(r,c,v,e){a[r]=a[r]||{};a[r][c]=v;e.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('sel'));e.classList.add('sel');calc()}function calc(){let CE=0,RO=0,AC=0,AE=0;d.forEach((r,i)=>{if(a[i]&&Object.keys(a[i]).length===4&&Object.values(a[i]).sort().join(',')==='1,2,3,4'){document.getElementById('s'+i).className='ok';document.getElementById('s'+i).innerHTML='✓ Gyldigt';CE+=a[i][0];RO+=a[i][1];AC+=a[i][2];AE+=a[i][3];}});ce.innerText=CE;ro.innerText=RO;ac.innerText=AC;ae.innerText=AE;let s='🚀 Ackommodativ';if(CE>=AC&&RO>=AE)s='🌟 Divergent';else if(AC>=CE&&RO>=AE)s='📚 Assimilativ';else if(AC>=CE&&AE>=RO)s='🎯 Konvergent';style.innerText=s;draw(CE,RO,AC,AE)}function draw(CE,RO,AC,AE){const c=document.getElementById('diamond'),x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);const cx=420,cy=300,m=220;x.fillStyle='#e9e9e9';x.fillRect(0,0,c.width,c.height);for(let i=1;i<=4;i++){let r=m*i/4;x.strokeStyle='#bdbdbd';x.beginPath();x.moveTo(cx,cy-r);x.lineTo(cx+r,cy);x.lineTo(cx,cy+r);x.lineTo(cx-r,cy);x.closePath();x.stroke()}x.strokeStyle='#e68642';x.lineWidth=5;x.beginPath();x.moveTo(cx,cy-m);x.lineTo(cx+m,cy);x.lineTo(cx,cy+m);x.lineTo(cx-m,cy);x.closePath();x.stroke();function p(v,d){let r=(v/40)*m;return d==0?[cx,cy-r]:d==1?[cx+r,cy]:d==2?[cx,cy+r]:[cx-r,cy]}let pts=[p(CE,0),p(RO,1),p(AC,2),p(AE,3)];x.strokeStyle='#2f7ea1';x.lineWidth=6;x.beginPath();x.moveTo(pts[0][0],pts[0][1]);pts.slice(1).forEach(z=>x.lineTo(z[0],z[1]));x.closePath();x.stroke();x.fillStyle='#333';x.font='bold 34px Arial';x.fillText('Personlighedsfordeling',220,55);x.font='20px Arial';x.fillText('(CE) ERFARING',340,95);x.fillText('(RO) OBSERVATION',650,305);x.fillText('(AC) ABSTRAKT',330,575);x.fillText('(AE) EKSPERIMENTER',10,305);function box(t,xp,yp){x.fillStyle='#444';x.fillRect(xp-22,yp-22,44,44);x.fillStyle='white';x.font='bold 18px Arial';x.fillText(t,xp-12,yp+6)}box(CE,cx,180);box(RO,545,300);box(AC,cx,425);box(AE,295,300);}draw(0,0,0,0);</script></body></html>
